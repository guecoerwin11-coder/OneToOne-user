<!DOCTYPE html>
<html>
<head>
  <title>Level 2 - Private Messaging</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #f0f2f5; height: 100vh; }

    /* LOGIN */
    #loginScreen {
      display: flex; align-items: center;
      justify-content: center; height: 100vh;
    }
    .login-card {
      background: white; padding: 40px;
      border-radius: 12px; width: 320px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    }
    .login-card h2 { margin-bottom: 20px; color: #333; }
    .login-card input {
      width: 100%; padding: 10px; margin-bottom: 12px;
      border: 1px solid #ddd; border-radius: 6px;
      font-size: 14px; box-sizing: border-box;
    }
    .login-card button {
      width: 100%; padding: 12px; background: #4CAF50;
      color: white; border: none; border-radius: 6px;
      cursor: pointer; font-size: 16px;
    }
    .error { color: red; margin-top: 8px; font-size: 14px; }

    /* CHAT APP */
    #chatScreen { display: none; height: 100vh; }
    .app { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      background: white; border-right: 1px solid #eee;
      display: flex; flex-direction: column;
    }
    .sidebar-header {
      padding: 20px; border-bottom: 1px solid #eee;
      font-weight: bold; font-size: 18px; color: #333;
    }
    .my-name {
      padding: 10px 20px; background: #f8f8f8;
      font-size: 13px; color: #666;
      border-bottom: 1px solid #eee;
    }
    .users-list { flex: 1; overflow-y: auto; }
    .user-item {
      padding: 15px 20px; cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid #f5f5f5;
      transition: background 0.2s;
    }
    .user-item:hover { background: #f5f5f5; }
    .user-item.active { background: #e8f5e9; }
    .online-dot {
      width: 10px; height: 10px;
      border-radius: 50%; flex-shrink: 0;
    }
    .dot-online { background: #4CAF50; }
    .dot-offline { background: #ccc; }
    .user-name { font-weight: 500; color: #333; }
    .user-status { font-size: 11px; color: #999; }

    /* CHAT AREA */
    .chat-area {
      display: flex; flex-direction: column;
      background: #f0f2f5;
    }
    .chat-header {
      background: white; padding: 15px 20px;
      border-bottom: 1px solid #eee;
      display: flex; align-items: center; gap: 10px;
    }
    .chat-header h3 { color: #333; }
    .chat-header .status { font-size: 12px; color: #999; }
    .no-chat {
      flex: 1; display: flex; align-items: center;
      justify-content: center; color: #999; font-size: 18px;
    }
    .messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .message {
      max-width: 60%; padding: 10px 14px;
      border-radius: 12px; font-size: 14px;
    }
    .message.received {
      background: white; align-self: flex-start;
      border-bottom-left-radius: 2px;
    }
    .message.sent {
      background: #4CAF50; color: white;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }
    .message .msg-name {
      font-size: 11px; font-weight: bold;
      margin-bottom: 4px; opacity: 0.7;
    }
    .message .msg-time {
      font-size: 10px; opacity: 0.6;
      margin-top: 4px; text-align: right;
    }
    .typing-indicator {
      padding: 5px 20px; font-size: 12px;
      color: #999; font-style: italic; min-height: 24px;
    }
    .input-area {
      background: white; padding: 15px 20px;
      display: flex; gap: 10px;
      border-top: 1px solid #eee;
    }
    .input-area input {
      flex: 1; padding: 10px 15px;
      border: 1px solid #ddd; border-radius: 20px;
      font-size: 14px; outline: none;
    }
    .input-area button {
      padding: 10px 20px; background: #4CAF50;
      color: white; border: none; border-radius: 20px;
      cursor: pointer; font-weight: bold;
    }
    .input-area button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-card">
      <h2>💬 Private Chat</h2>
      <p style="color:#666; margin-bottom:16px; font-size:13px;">
        Try: John, Jane, or Bob (password: 123456)
      </p>
      <input id="nameInput" placeholder="Your name" />
      <input id="passwordInput" type="password" placeholder="Password" />
      <button onclick="login()">Login</button>
      <p class="error" id="loginError"></p>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chatScreen">
    <div class="app">

      <!-- SIDEBAR -->
      <div class="sidebar">
        <div class="sidebar-header">💬 Messages</div>
        <div class="my-name" id="myName">Logged in as: ...</div>
        <div class="users-list" id="usersList">
          <p style="padding:20px; color:#999;">Loading users...</p>
        </div>
      </div>

      <!-- CHAT AREA -->
      <div class="chat-area" id="chatArea">
        <div class="no-chat" id="noChat">
          👈 Select someone to start chatting
        </div>

        <div id="activeChatArea" style="display:none; flex-direction:column; flex:1;">
          <div class="chat-header">
            <div class="online-dot dot-offline" id="recipientDot"></div>
            <div>
              <h3 id="recipientName">-</h3>
              <div class="status" id="recipientStatus">offline</div>
            </div>
          </div>

          <div class="messages" id="messages"></div>
          <div class="typing-indicator" id="typingIndicator"></div>

          <div class="input-area">
            <input
              id="messageInput"
              placeholder="Type a message..."
              onkeypress="handleKeyPress(event)"
            />
            <button id="sendBtn" onclick="sendMessage()">Send</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket = null
    let token = null
    let currentUser = null
    let currentRecipient = null
    let typingTimeout = null

    // ─────────────────────────────────
    // LOGIN
    // ─────────────────────────────────
    async function login() {
      const name = document.getElementById('nameInput').value.trim()
      const password = document.getElementById('passwordInput').value

      if (!name || !password) {
        document.getElementById('loginError').textContent = 'Please fill all fields!'
        return
      }

      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password })
      })

      const data = await res.json()

      if (res.ok) {
        token = data.token
        currentUser = data.user
        document.getElementById('loginScreen').style.display = 'none'
        document.getElementById('chatScreen').style.display = 'block'
        document.getElementById('myName').textContent = `Logged in as: ${currentUser.name}`
        await loadUsers()
        connectSocket()
      } else {
        document.getElementById('loginError').textContent = data.message
      }
    }

    // ─────────────────────────────────
    // LOAD USERS LIST
    // ─────────────────────────────────
    async function loadUsers() {
      const res = await fetch('/auth/users', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      const users = await res.json()
      renderUsers(users)
    }

    function renderUsers(users) {
      const container = document.getElementById('usersList')
      container.innerHTML = ''

      users.forEach(user => {
        const div = document.createElement('div')
        div.className = 'user-item'
        div.id = `user-item-${user.id}`
        div.innerHTML = `
          <div class="online-dot ${user.isOnline ? 'dot-online' : 'dot-offline'}"
               id="dot-${user.id}">
          </div>
          <div>
            <div class="user-name">${user.name}</div>
            <div class="user-status" id="status-${user.id}">
              ${user.isOnline ? 'Online' : 'Offline'}
            </div>
          </div>
        `
        div.onclick = () => startPrivateChat(user)
        container.appendChild(div)
      })
    }

    // ─────────────────────────────────
    // CONNECT SOCKET
    // ─────────────────────────────────
    function connectSocket() {
      socket = io({ auth: { token } })

      socket.on('connect', () => {
        console.log('✅ Socket connected!')
      })

      socket.on('connect_error', (err) => {
        console.log('❌ Connection error:', err.message)
      })

      // private message received
      socket.on('private message', (msg) => {
        // only show if it's for current conversation
        if (currentRecipient &&
          (msg.senderId === currentRecipient.id ||
           msg.senderId === currentUser.id)) {
          addMessage(msg)
        }
      })

      // typing indicators
      socket.on('typing', ({ name }) => {
        if (currentRecipient) {
          document.getElementById('typingIndicator')
            .textContent = `${name} is typing...`
        }
      })

      socket.on('stop typing', () => {
        document.getElementById('typingIndicator').textContent = ''
      })

      // online/offline status updates
      socket.on('user online', ({ id, name }) => {
        updateUserStatus(id, true)
        console.log(`🟢 ${name} is now online!`)
      })

      socket.on('user offline', ({ id, name }) => {
        updateUserStatus(id, false)
        console.log(`⚫ ${name} is now offline!`)
      })

      // room joined confirmation
      socket.on('room joined', ({ roomId }) => {
        console.log(`🚪 Joined private room: ${roomId}`)
      })
    }

    // ─────────────────────────────────
    // START PRIVATE CHAT
    // ─────────────────────────────────
    function startPrivateChat(user) {
      currentRecipient = user

      // update UI
      document.getElementById('noChat').style.display = 'none'
      document.getElementById('activeChatArea').style.display = 'flex'
      document.getElementById('recipientName').textContent = user.name
      document.getElementById('recipientStatus').textContent =
        user.isOnline ? 'Online 🟢' : 'Offline ⚫'
      document.getElementById('recipientDot').className =
        `online-dot ${user.isOnline ? 'dot-online' : 'dot-offline'}`

      // highlight selected user
      document.querySelectorAll('.user-item').forEach(el => {
        el.classList.remove('active')
      })
      document.getElementById(`user-item-${user.id}`)?.classList.add('active')

      // clear messages
      document.getElementById('messages').innerHTML = ''
      document.getElementById('typingIndicator').textContent = ''

      // join private room
      socket.emit('start private chat', { recipientId: user.id })
    }

    // ─────────────────────────────────
    // SEND MESSAGE
    // ─────────────────────────────────
    function sendMessage() {
      const input = document.getElementById('messageInput')
      const text = input.value.trim()

      if (!text || !currentRecipient) return

      socket.emit('private message', {
        recipientId: currentRecipient.id,
        text
      })

      input.value = ''
      socket.emit('stop typing', { recipientId: currentRecipient.id })
      clearTimeout(typingTimeout)
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') {
        sendMessage()
        return
      }

      if (currentRecipient) {
        socket.emit('typing', { recipientId: currentRecipient.id })
        clearTimeout(typingTimeout)
        typingTimeout = setTimeout(() => {
          socket.emit('stop typing', { recipientId: currentRecipient.id })
        }, 1000)
      }
    }

    // ─────────────────────────────────
    // UI HELPERS
    // ─────────────────────────────────
    function addMessage(msg) {
      const container = document.getElementById('messages')
      const isOwn = msg.senderId === currentUser.id

      const div = document.createElement('div')
      div.className = `message ${isOwn ? 'sent' : 'received'}`
      div.innerHTML = `
        ${!isOwn ? `<div class="msg-name">${msg.sender}</div>` : ''}
        <div>${msg.text}</div>
        <div class="msg-time">${msg.time}</div>
      `
      container.appendChild(div)
      container.scrollTop = container.scrollHeight
    }

    function updateUserStatus(userId, isOnline) {
      const dot = document.getElementById(`dot-${userId}`)
      const status = document.getElementById(`status-${userId}`)

      if (dot) {
        dot.className = `online-dot ${isOnline ? 'dot-online' : 'dot-offline'}`
      }
      if (status) {
        status.textContent = isOnline ? 'Online' : 'Offline'
      }

      // update recipient header if chatting with this user
      if (currentRecipient && currentRecipient.id === userId) {
        document.getElementById('recipientStatus').textContent =
          isOnline ? 'Online 🟢' : 'Offline ⚫'
        document.getElementById('recipientDot').className =
          `online-dot ${isOnline ? 'dot-online' : 'dot-offline'}`
        currentRecipient.isOnline = isOnline
      }
    }
  </script>
</body>
</html>
